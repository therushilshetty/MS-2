<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StaticsMaster · Car Equilibrium Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surface:#0d1117;--surface2:#111827;--surface3:#162033;
  --border:rgba(56,189,248,.13);--divider:rgba(56,189,248,.07);
  --text:#e2eeff;--muted:#8ba3c9;--faint:#4a607e;
  --cyan:#38bdf8;--cyan-glow:rgba(56,189,248,.18);
  --violet:#a78bfa;--violet-glow:rgba(167,139,250,.15);
  --orange:#fb923c;--orange-glow:rgba(251,146,60,.15);
  --green:#34d399;--rose:#fb7185;
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --r-lg:20px;
}
[data-theme="light"]{
  --bg:#f0f4fa;--surface:#fff;--surface2:#f5f9ff;--surface3:#eaf2ff;
  --border:rgba(14,80,180,.10);--divider:rgba(14,80,180,.06);
  --text:#0f172a;--muted:#4b6b96;--faint:#94a3b8;
  --cyan:#0284c7;--violet:#7c3aed;--orange:#ea580c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.hdr{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:60px;background:color-mix(in srgb,var(--surface) 85%,transparent);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;gap:12px}.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff}
.brand-name{font-size:15px;font-weight:700}.brand-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}

.layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 60px)}
.sidebar{padding:20px;border-right:1px solid var(--border);background:color-mix(in srgb,var(--surface) 70%,transparent);display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.main-col{padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}.card-pad{padding:20px}
.field label{display:block;font-size:9px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.iw input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);font-family:var(--mono)}
.iw input:focus{border-color:var(--cyan);outline:none;background:var(--surface3)}

.solve-btn{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--cyan),var(--violet));cursor:pointer;border:none;transition:0.3s;margin-top:10px}
.solve-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.errmsg{display:none;font-size:11px;color:var(--rose);background:rgba(251,113,133,0.1);padding:10px;border-radius:10px;margin-top:10px;border:1px solid rgba(251,113,133,0.2)}

.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:12px}.tab{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:0.2s}.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2)}

#fbdCanvas{width:100%;height:auto;display:block;background:var(--surface2);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.4)}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.chip{padding:12px;background:var(--surface2);border-radius:12px;border:1px solid var(--border);text-align:center}
.chip span{display:block;font-size:9px;color:var(--faint);font-weight:700;text-transform:uppercase;margin-bottom:4px}
.chip b{font-family:var(--mono);font-size:15px;color:var(--text)}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand"><div class="logo">SM</div><div><div class="brand-name">StaticsMaster</div><div class="brand-sub">MOMENTS & EQUILIBRIUM</div></div></div>
  <button id="themeBtn" style="background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:10px; font-size:12px; cursor:pointer">🌓 Theme Toggle</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="card card-pad">
      <div style="margin-bottom:15px"><h3 style="font-size:14px">Input parameters</h3></div>
      <div class="field-row">
        <div class="field"><label>Front to G (mm)</label><div class="iw"><input id="inp_df" value="1386"></div></div>
        <div class="field"><label>G to Rear (mm)</label><div class="iw"><input id="inp_dr" value="964"></div></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Mass (kg)</label><div class="iw"><input id="inp_mass" value="1400"></div></div>
        <div class="field"><label>Gravity (m/s²)</label><div class="iw"><input id="inp_g" value="9.81"></div></div>
      </div>
      <button class="solve-btn" id="solveBtn">⚡ Solve & Animate</button>
      <div class="errmsg" id="errMsg"></div>
    </div>

    <div id="resCard" class="card card-pad" style="display:none">
      <h3 style="font-size:12px; color:var(--cyan); margin-bottom:12px">Equilibrium Results</h3>
      <div class="results-grid">
        <div class="chip"><span>Weight (W)</span><b id="r_W">-</b></div>
        <div class="chip"><span>Wheelbase (L)</span><b id="r_L">-</b></div>
        <div class="chip"><span>Nf (ΣM_rear=0)</span><b id="r_Nf">-</b></div>
        <div class="chip"><span>Nr (ΣM_front=0)</span><b id="r_Nr">-</b></div>
      </div>
    </div>
  </aside>

  <main class="main-col">
    <div class="card">
      <div style="padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border)">
        <span style="font-size:13px; font-weight:600">Free Body & Geometry Engine</span>
        <div class="tabs" style="width:260px">
          <div class="tab active" data-tab="fbd">Forces (FBD)</div>
          <div class="tab" data-tab="geom">Dimensions</div>
        </div>
      </div>
      <div style="padding:20px"><canvas id="fbdCanvas" width="1800" height="1000"></canvas></div>
    </div>
  </main>
</div>

<script>
let dark = true;
const canvas = document.getElementById('fbdCanvas');
const ctx = canvas.getContext('2d');

function parse(id) {
  const val = document.getElementById(id).value.trim();
  const num = parseFloat(val);
  return isNaN(num) ? val : num;
}

function compute() {
  const df_raw = parse('inp_df'), dr_raw = parse('inp_dr');
  const m_raw = parse('inp_mass'), g_raw = parse('inp_g');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';

  const isSym = typeof df_raw === 'string' || typeof dr_raw === 'string' || typeof m_raw === 'string' || typeof g_raw === 'string';

  if (!isSym) {
    if (m_raw < 0 || g_raw < 0 || df_raw < 0 || dr_raw < 0) {
      err.textContent = "Error: Input values cannot be negative.";
      err.style.display = 'block'; return null;
    }
    const L = (df_raw + dr_raw) / 1000;
    if (L <= 0) { err.textContent = "Error: Total length must be > 0."; err.style.display = 'block'; return null; }
    
    const W = m_raw * g_raw;
    // Nf calculated via moments around Rear Wheel (ΣMr = 0)
    // Nr calculated via moments around Front Wheel (ΣMf = 0)
    return { df: df_raw/1000, dr: dr_raw/1000, L, W, Nf: (W * (dr_raw/1000)) / L, Nr: (W * (df_raw/1000)) / L, isSym: false };
  }
  return { df: df_raw, dr: dr_raw, L: 'L', W: 'W', Nf: 'Nf', Nr: 'Nr', isSym: true };
}

function draw(p, t, mode) {
  const th = dark ? {bg:'#0d1117', car:'#38bdf8', text:'#e2eeff', Nf:'#34d399', Nr:'#fbbf24', W:'#fb7185', dim:'#a78bfa', ref:'rgba(226,238,255,0.1)'} 
                  : {bg:'#ffffff', car:'#0284c7', text:'#0f172a', Nf:'#059669', Nr:'#d97706', W:'#e11d48', dim:'#7c3aed', ref:'rgba(15,23,42,0.08)'};
  
  ctx.clearRect(0,0,1800,1000);
  ctx.fillStyle = th.bg; ctx.fillRect(0,0,1800,1000);

  const Ax = 500, Bx = 1300, groundY = 600;
  const df_px = p.isSym ? 400 : (p.df / p.L) * (Bx - Ax);
  const Gx = Ax + df_px;

  // NEAT VERTICAL REFERENCE LINES (DOTTED)
  ctx.setLineDash([12, 12]); ctx.strokeStyle = th.ref; ctx.lineWidth = 3;
  [Ax, Gx, Bx].forEach(x => { 
    ctx.beginPath(); ctx.moveTo(x, groundY - 350); ctx.lineTo(x, groundY + 400); ctx.stroke(); 
  });
  ctx.setLineDash([]);

  // Ground Line
  ctx.strokeStyle = th.text + '20'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(100, groundY); ctx.lineTo(1700, groundY); ctx.stroke();

  // Car Body
  ctx.fillStyle = th.car + '15'; ctx.roundRect(Ax-220, groundY-280, (Bx-Ax)+440, 220, 50); ctx.fill();
  ctx.strokeStyle = th.car; ctx.lineWidth = 6; ctx.stroke();

  if (mode === 'fbd') {
    arrow(Gx, groundY-140, Gx, groundY+250, th.W, t, p.isSym ? "W" : `W: ${p.W.toFixed(0)}N`);
    arrow(Ax, groundY, Ax, groundY-450, th.Nf, t, p.isSym ? "Nf" : `Nf: ${p.Nf.toFixed(0)}N`);
    arrow(Bx, groundY, Bx, groundY-450, th.Nr, t, p.isSym ? "Nr" : `Nr: ${p.Nr.toFixed(0)}N`);
  } else {
    // TIERED DIMENSION SYSTEM (No Overlap)
    const tier1 = groundY + 120; // Level for df and dr
    const tier2 = groundY + 280; // Level for total L

    // Extension connect lines
    ctx.strokeStyle = th.dim; ctx.lineWidth = 2;
    [Ax, Gx, Bx].forEach(x => {
        ctx.beginPath(); ctx.moveTo(x, groundY + 20); ctx.lineTo(x, groundY + 80); ctx.stroke();
    });

    // df & dr (Tier 1)
    drawDimLine(Ax, Gx, tier1, p.isSym ? p.df : `df: ${(p.df*1000).toFixed(0)}mm`, th.dim);
    drawDimLine(Gx, Bx, tier1, p.isSym ? p.dr : `dr: ${(p.dr*1000).toFixed(0)}mm`, th.dim);

    // Total Wheelbase (Tier 2 - Placed lower for clarity)
    drawDimLine(Ax, Bx, tier2, p.isSym ? "Wheelbase L" : `Total Wheelbase L: ${(p.L*1000).toFixed(0)}mm`, th.cyan);
  }
}

function drawDimLine(x1, x2, y, label, col) {
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 4;
  // Horizontal track
  ctx.beginPath(); ctx.moveTo(x1+5, y); ctx.lineTo(x2-5, y); ctx.stroke();
  // Arrow tips
  ctx.beginPath(); ctx.moveTo(x1+25, y-15); ctx.lineTo(x1, y); ctx.lineTo(x1+25, y+15); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x2-25, y-15); ctx.lineTo(x2, y); ctx.lineTo(x2-25, y+15); ctx.fill();
  // Centered Label
  ctx.font = "bold 34px Space Grotesk"; ctx.textAlign = "center";
  ctx.fillText(label, (x1+x2)/2, y - 25);
}

function arrow(x1, y1, x2, y2, col, t, lbl) {
  const cx = x1 + (x2-x1)*t, cy = y1 + (y2-y1)*t;
  ctx.strokeStyle = col; ctx.lineWidth = 12; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(cx, cy); ctx.stroke();
  if (t > 0.95) {
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, 15, 0, 7); ctx.fill();
    ctx.font = "bold 38px Space Mono"; ctx.textAlign = "left";
    ctx.fillText(lbl, cx + 35, cy + 12);
  }
}

let anim;
document.getElementById('solveBtn').onclick = () => {
  const p = compute(); if (!p) return;
  document.getElementById('resCard').style.display = 'block';
  
  const set = (id, val) => document.getElementById(id).textContent = val;
  if (!p.isSym) {
    set('r_W', p.W.toFixed(0) + ' N'); set('r_L', p.L.toFixed(3) + ' m');
    set('r_Nf', p.Nf.toFixed(1) + ' N'); set('r_Nr', p.Nr.toFixed(1) + ' N');
  } else {
    set('r_W', 'm·g'); set('r_L', 'df + dr'); set('r_Nf', '(W·dr)/L'); set('r_Nr', '(W·df)/L');
  }

  let start = null;
  const step = (now) => {
    if (!start) start = now;
    const t = Math.min(1, (now - start) / 800);
    draw(p, t, document.querySelector('.tab.active').dataset.tab);
    if (t < 1) anim = requestAnimationFrame(step);
  };
  cancelAnimationFrame(anim); anim = requestAnimationFrame(step);
};

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelector('.tab.active').classList.remove('active');
    tab.classList.add('active');
    const p = compute(); if(p) draw(p, 1, tab.dataset.tab);
  };
});

document.getElementById('themeBtn').onclick = () => {
  dark = !dark; document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  const p = compute(); if(p) draw(p, 1, document.querySelector('.tab.active').dataset.tab);
};
</script>
</body>
</html>
